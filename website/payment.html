<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment | Night Shine</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<link rel="stylesheet" href="payment.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header>
  <div class="nav-bar">

    <a href="home.html" class="logo-left">
      <img src="1.png" alt="Night Shine Logo">
      <span class="logo-text">Night Shine</span>
    </a>

    <nav class="nav-right">
      <a href="home.html" title="Home"><i class="fa-solid fa-house"></i></a>
      <a href="shop.html" title="Shop"><i class="fa-solid fa-store"></i></a>
      <a href="blog.html" title="Blog"><i class="fa-solid fa-pen-nib"></i></a>
      <a href="contact.html" title="Contact"><i class="fa-solid fa-envelope"></i></a>
    </nav>

  </div>
</header>

<!-- ================= PAYMENT ================= -->
<main class="payment-wrapper">

  <div class="payment-container">

    <!-- BACK BUTTON (INSIDE CONTAINER) -->
    <button class="back-btn" onclick="history.back()">&#8592;</button>

    <!-- CART SUMMARY -->
    <div class="cart-summary">
      <h2>Cart Summary</h2>
      <div id="cartItems"></div>
      <div class="total-box">
        <span>Total Amount</span>
        <strong id="totalAmount">₹0</strong>
      </div>
    </div>

    <!-- PAYMENT FORM -->
    <div class="payment-form">
      <h2>Payment Details</h2>
      <form id="paymentForm">
        <label>Name on Card<input type="text" required></label>
        <label>Card Number<input type="text" required></label>
        <label>Expiry Date<input type="text" required></label>
        <label>CVV<input type="password" required></label>
        <button type="submit" class="pay-btn">Proceed to Pay</button>
      </form>
    </div>

  </div>
</main>

<!-- ================= FOOTER ================= -->
<footer>
  <div class="footer-content">
    <div class="footer-left">
      <img src="1.png">
      <span>Night Shine</span>
    </div>
    <div class="footer-right">
      <p>📞 +91 98765 43210</p>
      <p>✉ support@nightshine.com</p>
    </div>
  </div>
</footer>

<!-- ================= TOAST ================= -->
<div id="toast" class="toast"></div>
<script>
function showToast(msg,type="success"){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.className="toast show "+type;
  setTimeout(()=>t.className="toast",3000);
}

/* ================= LOAD CART ================= */
const cart = JSON.parse(localStorage.getItem("cart")) || [];
const cartItemsContainer = document.getElementById("cartItems");
let total = 0;

cart.forEach(item=>{
  const div=document.createElement("div");
  div.className="cart-item";
  div.innerHTML=`
    <span>${item.name} × ${item.qty}</span>
    <span>₹ ${item.price * item.qty}</span>
  `;
  cartItemsContainer.appendChild(div);
  total += item.price * item.qty;
});

document.getElementById("totalAmount").innerText="₹ "+total;

/* ================= PAYMENT SUBMIT ================= */
document.getElementById("paymentForm").addEventListener("submit",e=>{
  e.preventDefault();

  if(cart.length===0){
    showToast("Cart is empty","error");
    return;
  }

  let orders = JSON.parse(localStorage.getItem("nightshine_orders")) || [];

  cart.forEach(item=>{
    orders.push({
      id: item.id,
      name: item.name,
      image: item.image,        // ✅ IMAGE SAVED
      qty: item.qty,
      amount: item.price * item.qty,
      date: new Date().toLocaleString()
    });
  });

  localStorage.setItem("nightshine_orders",JSON.stringify(orders));
  localStorage.removeItem("cart");

  showToast("Payment Successful","success");

  setTimeout(()=>location.href="account.html",1200);
});
</script>


</body>
</html>
