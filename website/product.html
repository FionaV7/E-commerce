const pid=new URLSearchParams(location.search).get("id");
const p=products[pid];
if(p){
productName.textContent=p.name;
productPrice.textContent="₹ "+p.price;
productDesc.textContent=p.desc;
productImg.src=p.image;
}

function changeQty(v){
const q=document.getElementById("qty");
let val=parseInt(q.value)+v;
if(val<1) val=1;
if(val>100) val=100;
q.value=val;
}
/* ---------- ADD TO CART ---------- */
function addToCart(){
  const qty = parseInt(document.getElementById("qty").value);
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  const found = cart.find(item => item.id === p.id);

  if(found){
    found.qty += qty;
    showToast("Quantity updated in Cart");
  } else {
    cart.push({ ...p, qty });
    showToast("Added to Cart");
  }

  localStorage.setItem("cart", JSON.stringify(cart));
}

/* ---------- BUY NOW ---------- */
function buyNow(){
  addToCart();
  location.href = "cart.html";
}

/* ---------- ADD TO WISHLIST ---------- */
function addToWishlist(){
  const qty = parseInt(document.getElementById("qty").value);
  let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

  const found = wishlist.find(item => item.id === p.id);

  if(found){
    found.qty += qty;
    showToast("Quantity updated in Wishlist");
  } else {
    wishlist.push({ ...p, qty });
    showToast("Added to Wishlist");
  }

  localStorage.setItem("wishlist", JSON.stringify(wishlist));
}
